<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Durian AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg-dark: #0a2e0a;
      --card-bg: #113311;
      --input-bg: #0a1f0a;
      --green: #00ff00;
      --lime: #00cc00;
      --gold: #ffd700;
      --red: #ff3333;
      --glow: 0 0 20px #00ff00, 0 0 40px #00ff00;
    }
    [data-theme=dark]{
      --bg-dark: #000000;
      --card-bg: #001100;
      --input-bg: #001a00;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      font-family: 'Share Tech Mono', monospace;
      background: var(--bg-dark) url('../static/assets/durian-bg.jpg') center/cover fixed;
      color: var(--green);
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:2rem;
      text-shadow: 0 0 5px var(--green);
    }
    .overlay{
      position:fixed;top:0;left:0;width:100%;height:100%;
      background:rgba(0,40,0,.9);z-index:1;
    }

    /* === NAVBAR – EXACT FROM index.html === */
    nav{
      position:fixed;top:20px;left:50%;transform:translateX(-50%);
      background:rgba(0,50,0,.8);backdrop-filter:blur(12px);
      border:2px solid #00ff00;border-radius:12px;
      padding:.8rem 2rem;display:flex;align-items:center;gap:1.5rem;
      z-index:1000;box-shadow:0 0 20px rgba(0,255,0,.6);
      font-family: 'Orbitron', sans-serif;
    }
    .brand{
      font-size:1.6rem;color:var(--green);font-weight:800;
      text-shadow:0 0 15px var(--green);
    }
    nav a{
      color:var(--green);text-decoration:none;font-weight:600;
      padding:.5rem 1rem;border-radius:8px;transition:all .3s;
      border:1px solid transparent;
    }
    nav a:hover{
      background:var(--lime);color:#000;border:1px solid #00ff00;
      box-shadow:0 0 15px var(--green);
    }

    /* === THEME TOGGLE === */
    .theme-btn{
      position:fixed;top:25px;right:25px;
      background:rgba(0,50,0,.8);border:2px solid var(--green);
      width:58px;height:58px;border-radius:50%;
      font-size:1.7rem;color:var(--green);cursor:pointer;
      z-index:1000;transition:.3s;
      box-shadow:0 0 15px rgba(0,255,0,.5);
    }
    .theme-btn:hover{transform:scale(1.1);box-shadow:0 0 25px var(--green);}

    /* === FORM CARD === */
    .form-card{
      margin-top:140px;width:100%;max-width:460px;
      background:var(--card-bg);border:2px solid var(--green);
      border-radius:16px;padding:3rem;
      box-shadow:0 0 30px rgba(0,255,0,.4), inset 0 0 20px rgba(0,255,0,.1);
      position:relative;z-index:10;
      animation:scanline 6s linear infinite;
    }
    @keyframes scanline{
      0%{box-shadow:0 0 30px rgba(0,255,0,.4), inset 0 0 20px rgba(0,255,0,.1);}
      50%{box-shadow:0 0 50px rgba(0,255,0,.6), inset 0 0 30px rgba(0,255,0,.2);}
      100%{box-shadow:0 0 30px rgba(0,255,0,.4), inset 0 0 20px rgba(0,255,0,.1);}
    }

    h2{
      font-family:'Orbitron',sans-serif;text-align:center;
      font-size:2.5rem;color:var(--green);
      margin-bottom:2rem;text-shadow:0 0 20px var(--green);
      animation:pulseText 2s infinite;
    }
    @keyframes pulseText{
      0%,100%{text-shadow:0 0 20px var(--green);}
      50%{text-shadow:0 0 40px var(--green), 0 0 60px var(--green);}
    }

    /* === INPUTS === */
    input{
      width:100%;padding:1.2rem;margin:1rem 0;
      background:var(--input-bg);border:1.5px solid var(--green);
      border-radius:8px;color:var(--green);
      font-family:'Share Tech Mono',monospace;font-size:1.1rem;
      transition:.3s;caret-color:var(--green);
    }
    input::placeholder{color:rgba(0,255,0,.6);}
    input:focus{
      outline:none;border-color:var(--lime);
      background:rgba(0,255,0,.1);
      box-shadow:var(--glow);
    }

    /* === BUTTON === */
    button{
      width:100%;padding:1.2rem;margin-top:1.8rem;
      background:var(--lime);color:#000;
      border:2px solid var(--green);border-radius:8px;
      font-weight:700;font-size:1.2rem;font-family:'Orbitron',sans-serif;
      cursor:pointer;transition:.4s;
      box-shadow:0 0 20px rgba(0,255,0,.6);
      text-transform:uppercase;letter-spacing:1px;
    }
    button:hover{
      background:var(--green);color:#000;
      transform:translateY(-3px);
      box-shadow:0 0 30px var(--green), 0 0 50px var(--green);
    }

    /* === MESSAGES === */
    .msg{
      margin-top:1rem;text-align:center;
      font-weight:600;font-size:1rem;padding:.6rem 1rem;
      border-radius:8px;border:1px solid;
      animation:blink 1.5s infinite;
    }
    .msg.success{
      color:var(--green);background:rgba(0,255,0,.2);border-color:var(--green);
    }
    .msg.error{
      color:var(--red);background:rgba(255,51,51,.2);border-color:var(--red);
    }
    @keyframes blink{
      0%,100%{opacity:1}50%{opacity:0.7}
    }

    /* === LOGIN LINK === */
    .login-link{
      text-align:center;
      margin-top:1.5rem;
      font-size:1rem;
      color:var(--green);
    }
    .login-link a{
      color:var(--lime);
      text-decoration:none;
      font-weight:600;
      border-bottom:1px dashed var(--lime);
      transition:.3s;
    }
    .login-link a:hover{
      color:var(--green);
      text-shadow:0 0 10px var(--lime);
      border-bottom:1px solid var(--lime);
    }

    /* === FOOTER – EXACT FROM index.html === */
    footer{
      margin-top:auto;position:relative;z-index:10;
      background:rgba(0,40,0,.8);border-top:2px solid var(--green);
      padding:2rem;text-align:center;font-size:.9rem;
      color:var(--green);box-shadow:0 -10px 20px rgba(0,255,0,.3);
    }
    .social a{color:var(--green);margin:0 1rem;font-size:1.5rem;transition:.3s;}
    .social a:hover{color:var(--lime);text-shadow:0 0 15px var(--green);}
  </style>
</head>
<body>
  <div class="overlay"></div>

  <button class="theme-btn" onclick="toggleTheme()"></button>

  <!-- NAVBAR – EXACT FROM index.html -->
  <nav>
    <div class="brand">Durian AI</div>
    <a href="{{ url_for('index') }}">Home</a>
    <a href="{{ url_for('about') }}">About</a>
    <a href="{{ url_for('login') }}">Login</a>
    <a href="{{ url_for('register') }}">Register</a>
  </nav>

  <div class="form-card">
    <h2>Create Account</h2>

    <!-- MESSAGE -->
    {% if message %}
      <p class="msg {% if 'Successfully' in message %}success{% else %}error{% endif %}">
        {{ message }}
      </p>
    {% endif %}

    <form action="{{ url_for('register') }}" method="POST">
      <input type="text" name="name" placeholder="Full Name" required>
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Password" required>
      <input type="password" name="c_password" placeholder="Confirm Password" required>
      <button type="submit">Join Durian AI</button>
    </form>

    <!-- ALREADY HAVE ACCOUNT? LOGIN LINK -->
    <div class="login-link">
      Already have an account? <a href="{{ url_for('login') }}">Login here</a>
    </div>
  </div>


  <script>
    function toggleTheme(){
      document.body.dataset.theme = document.body.dataset.theme === 'dark' ? 'light' : 'dark';
    }
  </script>
</body>
</html>
