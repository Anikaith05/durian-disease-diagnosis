<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Durian AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg-dark: #0a2e0a;
      --card-bg: #113311;
      --input-bg: #0a1f0a;
      --green: #00ff00;
      --lime: #00cc00;
      --gold: #ffd700;
      --red: #ff3333;
      --glow: 0 0 20px #00ff00, 0 0 40px #00ff00;
    }
    [data-theme=dark]{
      --bg-dark: #000000;
      --card-bg: #001100;
      --input-bg: #001a00;
    }
    *{margin:0;padding:0;box-sizing:border-box;scroll-behavior:smooth;}
    body{
      font-family: 'Share Tech Mono', monospace;
      background: var(--bg-dark) url('https://images.unsplash.com/photo-1736406018935-0230b2029549?ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTh8fGR1cmlhbiUyMGFpfGVufDB8fDB8fHww&auto=format&fit=crop&q=60&w=500') center/cover fixed;
      color: var(--green);
      min-height:100vh;
      position:relative;
      text-shadow: 0 0 5px var(--green);
    }
    .overlay{
      position:fixed;top:0;left:0;width:100%;height:100%;
      background:rgba(0,40,0,.9);z-index:1;
    }
    .particles{
      position:fixed;top:0;left:0;width:100%;height:100%;z-index:2;pointer-events:none;
    }
    .particle{
      position:absolute;background:var(--green);border-radius:50%;opacity:.6;
      animation:float 6s infinite ease-in-out;
    }
    @keyframes float{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-20px) rotate(180deg)}}

    /* === NAVBAR – EXACT FROM LOGIN.HTML === */
    nav{
      position:fixed;top:20px;left:50%;transform:translateX(-50%);
      background:rgba(0,50,0,.8);backdrop-filter:blur(12px);
      border:2px solid #00ff00;border-radius:12px;
      padding:.8rem 2rem;display:flex;align-items:center;gap:1.5rem;
      z-index:1000;box-shadow:0 0 20px rgba(0,255,0,.6);
      font-family: 'Orbitron', sans-serif;
    }
    .brand{
      font-size:1.6rem;color:var(--green);font-weight:800;
      text-shadow:0 0 15px var(--green);
    }
    nav a{
      color:var(--green);text-decoration:none;font-weight:600;
      padding:.5rem 1rem;border-radius:8px;transition:all .3s;
      border:1px solid transparent;
    }
    nav a:hover{
      background:var(--lime);color:#000;border:1px solid #00ff00;
      box-shadow:0 0 15px var(--green);
    }

    /* === THEME TOGGLE === */
    .theme-btn{
      position:fixed;top:25px;right:25px;
      background:rgba(0,50,0,.8);border:2px solid var(--green);
      width:58px;height:58px;border-radius:50%;
      font-size:1.7rem;color:var(--green);cursor:pointer;
      z-index:1000;transition:.3s;
      box-shadow:0 0 15px rgba(0,255,0,.5);
    }
    .theme-btn:hover{transform:scale(1.1);box-shadow:0 0 25px var(--green);}

    /* === HERO SECTION === */
    header{
      position:relative;z-index:10;height:100vh;
      display:flex;flex-direction:column;justify-content:center;align-items:center;
      text-align:center;padding:2rem;
    }
    .logo{
      width:160px;height:160px;
      background:radial-gradient(circle,var(--lime),#008800);
      border:3px solid var(--green);border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:4rem;color:#000;margin-bottom:1.5rem;
      box-shadow:0 0 40px var(--green),0 0 80px var(--green);
      animation:pulse 2s infinite;
    }
    @keyframes pulse{
      0%{box-shadow:0 0 40px var(--green)}
      50%{box-shadow:0 0 80px var(--green),0 0 120px var(--green)}
      100%{box-shadow:0 0 40px var(--green)}
    }
    h1{
      font-family:'Orbitron',sans-serif;font-size:6rem;
      color:var(--green);margin-bottom:1rem;
      text-shadow:0 0 40px var(--green);
      animation:neon 3s infinite;
    }
    @keyframes neon{
      0%,100%{text-shadow:0 0 30px var(--green)}
      50%{text-shadow:0 0 60px var(--green),0 0 90px var(--green)}
    }
    p{
      font-size:1.5rem;max-width:800px;opacity:.95;
      text-shadow:0 3px 10px rgba(0,0,0,.6);
    }

    /* === FOOTER === */
    footer{
      position:relative;z-index:10;
      background:rgba(0,40,0,.8);border-top:2px solid var(--green);
      padding:2rem;text-align:center;font-size:.9rem;
      color:var(--green);box-shadow:0 -10px 20px rgba(0,255,0,.3);
    }
    .social a{color:var(--green);margin:0 1rem;font-size:1.5rem;transition:.3s;}
    .social a:hover{color:var(--lime);text-shadow:0 0 15px var(--green);}

    @media(max-width:768px){
      h1{font-size:3.5rem}
      nav{flex-wrap:wrap;padding:.6rem;gap:1rem}
    }
  </style>
</head>
<body>
  <div class="overlay"></div>
  <div class="particles" id="particles"></div>

  <button class="theme-btn" onclick="toggleTheme()"></button>

  <!-- NAVBAR – EXACT FROM LOGIN.HTML -->
  <nav>
    <div class="brand">Durian AI</div>
    <a href="{{ url_for('index') }}">Home</a>
    <a href="{{ url_for('about') }}">About</a>
    <a href="{{ url_for('login') }}">Login</a>
    <a href="{{ url_for('register') }}">Register</a>
  </nav>

  <header>
    <div class="logo">Durian</div>
    <h1>Deep Learning-Based Diagnosis of Diseases in Durian Plants</h1>
    <p>AI‑Powered Disease Detection for Durian Leaves &amp; Fruits</p>
  </header>

  <!-- FOOTER -->
  <footer>
    <p>© 2025 <strong>Durian AI</strong>. All Rights Reserved.</p>
   
  </footer>

  <script>
    function toggleTheme(){
      document.body.dataset.theme = document.body.dataset.theme === 'dark' ? 'light' : 'dark';
    }

    // Particles
    const pc = document.getElementById('particles');
    for(let i=0;i<30;i++){
      const p = document.createElement('div'); p.className='particle';
      p.style.width = p.style.height = Math.random()*6+3+'px';
      p.style.left = Math.random()*100+'%';
      p.style.top = Math.random()*100+'%';
      p.style.animationDelay = Math.random()*5+'s';
      p.style.animationDuration = (Math.random()*8+5)+'s';
      pc.appendChild(p);
    }
  </script>
</body>
</html>
